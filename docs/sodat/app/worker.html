<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SODAT 作業者用</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="./common.css">
</head>
<body>
<header class="app">
  <h1>SODAT</h1><span class="role">作業者用</span>
  <nav><a href="./">ホーム</a><a href="./manager">管理者</a><a href="./applicant">応募者</a></nav>
</header>
<div class="wrap">
  <div class="card">
    <div class="row"><label class="small muted">作業者</label><select id="wSel"></select></div>
    <p class="small muted" style="margin:.6rem 0 0">実施した作業を記録すると <code>work_records</code> に追記され、実績からスキルが育ちます（① スキル導出）。TPOCast連携の代替として、当面はこの画面から記録します。</p>
  </div>

  <div class="card">
    <h2>作業を記録</h2>
    <div class="row">
      <select id="cropSel">
        <option value="veg">野菜</option><option value="fruit">果樹</option><option value="tea">茶</option>
      </select>
      <select id="taskSel" style="min-width:220px"></select>
      <label class="small muted">数量</label>
      <input id="qty" type="number" value="1" min="1" style="width:80px">
      <button id="rec">記録する</button>
      <button class="ghost" id="reset" title="ローカル追記をリセット">リセット</button>
    </div>
    <div id="recMsg" class="hint" style="display:none;margin-top:.7rem"></div>
  </div>

  <div class="card">
    <h2>あなたのスキル <span class="small muted">（実績の累積）</span></h2>
    <table id="skillTable"><thead><tr><th>タスク</th><th>作目</th><th>適性</th><th>累計実績</th><th></th></tr></thead><tbody></tbody></table>
  </div>

  <div class="card">
    <h2>今回セッションの記録</h2>
    <div id="log" class="kv"><span class="muted small">まだありません。</span></div>
  </div>
</div>

<script src="./data.js"></script>
<script>
const cropLabel={veg:'野菜',fruit:'果樹',tea:'茶'};
const cropBadge=c=>`<span class="badge crop-${c}">${cropLabel[c]||c}</span>`;
const apt=a=>`<span class="apt apt-${a}">${a}</span>`;
let wid;const sessionLog=[];

async function boot(){
  await SODAT.load();
  const sel=document.getElementById('wSel');
  SODAT.db.workers.forEach(w=>{const o=document.createElement('option');o.value=w.worker_id;o.textContent=`${w.name}（${w.worker_id}）`;sel.appendChild(o);});
  sel.onchange=()=>{wid=sel.value;renderSkills();};
  wid=SODAT.db.workers[0].worker_id;
  document.getElementById('cropSel').onchange=fillTasks;
  document.getElementById('rec').onclick=record;
  document.getElementById('reset').onclick=()=>SODAT.resetLocal();
  fillTasks(); renderSkills();
}
function fillTasks(){
  const crop=document.getElementById('cropSel').value;
  const ts=SODAT.tasksByCrop(crop);
  const sel=document.getElementById('taskSel');sel.innerHTML='';
  ts.forEach(t=>{const o=document.createElement('option');o.value=t.task_type_id;o.textContent=`${t.task_name}  ${t.spot_aptitude}`;sel.appendChild(o);});
}
function record(){
  const ttid=document.getElementById('taskSel').value;
  const qty=parseInt(document.getElementById('qty').value||'1',10);
  const rec=SODAT.addWork(wid,ttid,qty);
  const t=SODAT.task(ttid);
  sessionLog.unshift(`${t.task_name}×${qty}`);
  const msg=document.getElementById('recMsg');
  msg.style.display='';msg.innerHTML=`記録しました: <b>${t.task_name}</b> ×${qty} → <code>${ttid}</code> の累計実績が増えました。`;
  document.getElementById('log').innerHTML=sessionLog.map(x=>`<span class="pill">${x}</span>`).join('');
  renderSkills();
}
function renderSkills(){
  const w=SODAT.worker(wid);
  const st=document.querySelector('#skillTable tbody');st.innerHTML='';
  const sorted=[...w.skills].sort((a,b)=>b.work_count-a.work_count);
  if(!sorted.length){st.innerHTML='<tr><td colspan="5" class="muted">まだ実績がありません。上で作業を記録してください。</td></tr>';return;}
  const max=Math.max(...sorted.map(s=>s.work_count));
  sorted.forEach(s=>{const t=SODAT.task(s.task_type_id);const tr=document.createElement('tr');
    tr.innerHTML=`<td><b>${t.task_name}</b><div class="small muted">${t.task_type_id}</div></td>
      <td>${cropBadge(t.crop)}</td><td>${apt(t.spot_aptitude)}</td><td>${s.work_count}回</td>
      <td style="width:120px"><div class="bar"><i style="width:${Math.round(s.work_count/max*100)}%"></i></div></td>`;
    st.appendChild(tr);});
}
boot();
</script>
</body>
</html>
