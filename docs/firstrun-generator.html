<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Sodat — redirecting…</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="0;url=/#step-3">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; max-width: 560px; margin: 4rem auto; padding: 0 1rem; line-height: 1.6; color: #15803d; }
  a { color: #15803d; font-weight: 600; }
</style>
</head>
<body>
<p>
  <span lang="ja">スニペット生成はガイドの Step 3 に統合されました。リダイレクト中…</span><br>
  <span lang="en">Snippet generation has moved into Step 3 of the guide. Redirecting…</span>
</p>
<p>→ <a id="goto" href="/#step-3">/#step-3</a></p>
<script>
// Preserve the access token in the redirect.
(function () {
  let token = '';
  try { token = new URLSearchParams(window.location.search).get('token') || ''; }
  catch (e) {}
  const target = token
    ? '/?token=' + encodeURIComponent(token) + '#step-3'
    : '/#step-3';
  // Update the fallback link and trigger an immediate JS redirect (in case
  // the <meta refresh> is disabled / blocked).
  document.getElementById('goto').setAttribute('href', target);
  window.location.replace(target);
})();
</script>
</body>
</html>
