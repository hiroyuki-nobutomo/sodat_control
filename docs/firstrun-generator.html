<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Sodat — redirecting…</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="0;url=/#step-3">
<link rel="stylesheet" href="/app.css">
<style>
  /* Redirect stub kept for old links that bookmarked the standalone
     snippet generator. The wizard absorbed it in Step 3. */
  body { max-width: 560px; margin: 4rem auto; padding: 0 1rem; color: var(--ink-soft); }
  a { font-weight: 500; }
</style>
</head>
<body>
<p>
  <span lang="ja">スニペット生成はガイドの Step 3 に統合されました。リダイレクト中…</span><br>
  <span lang="en">Snippet generation has moved into Step 3 of the guide. Redirecting…</span>
</p>
<p>→ <a id="goto" href="/#step-3">/#step-3</a></p>
<script>
// Preserve the access token in the redirect.
(function () {
  let token = '';
  try { token = new URLSearchParams(window.location.search).get('token') || ''; }
  catch (e) {}
  const target = token
    ? '/?token=' + encodeURIComponent(token) + '#step-3'
    : '/#step-3';
  document.getElementById('goto').setAttribute('href', target);
  window.location.replace(target);
})();
</script>
</body>
</html>
